<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>asand.ro — coming soon</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:ital,wght@0,300;0,400;0,700;1,400;1,700&family=Barlow:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black:   #111010;
    --ember:   #ff4a1c;
    --ash:     #2a2725;
    --smoke:   #5a5350;
    --cream:   #f0ece4;
    --dim:     #8a837c;
  }

  html, body {
    height: 100%;
    background: var(--black);
    color: var(--cream);
    overflow: hidden;
  }

  /* ── NOISE GRAIN OVERLAY ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    background-size: 200px 200px;
    pointer-events: none;
    z-index: 10;
    opacity: 0.55;
  }

  /* ── HOT LINE top ── */
  .hot-line {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, transparent, var(--ember), transparent);
    animation: scan 4s ease-in-out infinite;
  }
  @keyframes scan {
    0%   { transform: scaleX(0); transform-origin: left; opacity: 0; }
    30%  { transform: scaleX(1); transform-origin: left; opacity: 1; }
    70%  { transform: scaleX(1); transform-origin: right; opacity: 1; }
    100% { transform: scaleX(0); transform-origin: right; opacity: 0; }
  }

  /* ── LAYOUT ── */
  .stage {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    height: 100vh;
    padding: 0 10vw;
    position: relative;
  }

  /* ── BIG NUMBER background ── */
  .bg-number {
    position: absolute;
    right: 6vw;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(180px, 28vw, 380px);
    color: var(--ash);
    line-height: 1;
    user-select: none;
    pointer-events: none;
    letter-spacing: -4px;
    opacity: 0;
    animation: fadeUp 1s 0.2s forwards;
  }

  /* ── EYEBROW ── */
  .eyebrow {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(11px, 1.1vw, 14px);
    font-weight: 700;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--ember);
    margin-bottom: 28px;
    opacity: 0;
    animation: fadeUp 0.7s 0.5s forwards;
  }

  /* ── HEADLINE ── */
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(64px, 10vw, 148px);
    line-height: 0.9;
    letter-spacing: 0.01em;
    color: var(--cream);
    margin-bottom: 42px;
    opacity: 0;
    animation: fadeUp 0.7s 0.75s forwards;
  }

  h1 em {
    font-style: italic;
    color: var(--ember);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: clamp(52px, 8vw, 118px);
  }

  /* ── DIVIDER ── */
  .rule {
    width: 60px;
    height: 2px;
    background: var(--ember);
    margin-bottom: 36px;
    opacity: 0;
    animation: fadeUp 0.6s 1.05s forwards;
  }

  /* ── SUBTEXT ── */
  .subtext {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(16px, 2.2vw, 24px);
    font-weight: 400;
    font-style: italic;
    color: var(--dim);
    line-height: 1.5;
    max-width: 540px;
    margin-bottom: 52px;
    opacity: 0;
    animation: fadeUp 0.7s 1.2s forwards;
  }

  .subtext strong {
    color: var(--cream);
    font-style: normal;
    font-weight: 700;
  }

  /* ── EMAIL ── */
  .email-line {
    display: flex;
    align-items: center;
    gap: 14px;
    opacity: 0;
    animation: fadeUp 0.7s 1.5s forwards;
  }

  .email-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--ember);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,74,28,0.7); }
    50%       { box-shadow: 0 0 0 10px rgba(255,74,28,0); }
  }

  .email-addr {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: clamp(15px, 1.8vw, 20px);
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--cream);
    text-decoration: none;
    border-bottom: 1px solid var(--smoke);
    padding-bottom: 2px;
    transition: color 0.2s, border-color 0.2s;
  }
  .email-addr:hover {
    color: var(--ember);
    border-color: var(--ember);
  }

  /* ── CORNER BRAND ── */
  .brand {
    position: fixed;
    bottom: 32px;
    left: 10vw;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--smoke);
    opacity: 0;
    animation: fadeUp 0.6s 1.8s forwards;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 600px) {
    .stage { padding: 0 7vw; justify-content: flex-end; padding-bottom: 14vh; }
    .bg-number { display: none; }
    h1 { font-size: clamp(60px, 18vw, 90px); }
  }
</style>
</head>
<body>

<div class="hot-line"></div>

<div class="stage">

  <div class="bg-number" aria-hidden="true">2026</div>

  <p class="eyebrow">asand.ro &nbsp;/&nbsp; status: în pregătire</p>

  <h1>
    Nimic<br>
    de văzut<br>
    <em>aici.</em><br>
    Deocamdată.
  </h1>

  <div class="rule"></div>

  <p class="subtext">
    Nu e gata. Nu e pentru toată lumea.<br>
    Când va fi, va fi <strong>corect făcut</strong> — nu rapid, nu de dragul bifei.<br>
    Până atunci, dacă știi ce vrei și ești serios —
    <strong>scrie-mi.</strong>
  </p>

  <div class="email-line">
    <span class="email-dot" aria-hidden="true"></span>
    <a class="email-addr" href="mailto:salut.andreead@gmail.com">salut.andreead@gmail.com</a>
  </div>

</div>

<p class="brand">© 2026 a[sand].ro &nbsp;— &nbsp;București</p>

</body>
</html>
